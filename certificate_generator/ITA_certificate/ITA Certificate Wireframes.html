<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>ITA Training Certificate — Wireframes</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Patrick+Hand&family=Special+Elite&display=swap" rel="stylesheet" />

<style>
  html, body { margin:0; padding:0; height:100%; background:#efece4; font-family:'Patrick Hand', system-ui, sans-serif; }
  body { overflow:hidden; }
  .frame { background:#fbfaf5; border-radius:4px; box-shadow:0 1px 0 rgba(0,0,0,0.05), 0 12px 30px -10px rgba(27,46,91,0.18); width:100%; height:100%; overflow:hidden; }
  .legend { position:fixed; top:16px; left:16px; z-index:30; background:#fbfaf5; border:1.5px solid #1B2E5B; border-radius:8px; padding:10px 14px; max-width:380px; font-family:'Patrick Hand'; color:#1B2E5B; font-size:14px; line-height:1.4; box-shadow:0 8px 24px -10px rgba(27,46,91,.2); }
  .legend strong { font-family:'Caveat'; font-size:20px; display:block; margin-bottom:2px; }
  .legend em { font-family:'Special Elite'; font-style:normal; font-size:10px; letter-spacing:2px; color:#666; display:block; margin-top:6px; }
</style>
</head>
<body>

<div class="legend">
  <strong>ITA Training Certificate — wireframes</strong>
  Six directions, low-fi. Compare side by side, click any to focus.
  <em>LANDSCAPE · 11 × 8.5 IN · PRINT + DIGITAL</em>
</div>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="wireframes/CertWireframes.jsx"></script>

<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard } = window;
  const {
    WireClassic, WireCivic, WireStatehouse, WireMap, WireRibbon, WireMinimal,
  } = window;

  const Frame = ({ children }) => <div className="frame">{children}</div>;

  const App = () => (
    <DesignCanvas storageKey="ita-cert-wireframes" backgroundColor="#efece4">
      <DCSection id="ornate" title="01 · Ornate & formal" subtitle="Diploma-style — ornamental borders, symmetry, ribbons, seals">
        <DCArtboard id="classic" label="A. Classic centered diploma" width={1100} height={800}>
          <Frame><WireClassic /></Frame>
        </DCArtboard>
        <DCArtboard id="ribbon" label="B. Ribbon banner" width={1100} height={800}>
          <Frame><WireRibbon /></Frame>
        </DCArtboard>
      </DCSection>

      <DCSection id="civic" title="02 · Civic / institutional" subtitle="Government-formal — asymmetric layouts, statehouse, plaque feel">
        <DCArtboard id="plaque" label="C. Plaque (seal-left, asymmetric)" width={1100} height={800}>
          <Frame><WireCivic /></Frame>
        </DCArtboard>
        <DCArtboard id="statehouse" label="D. Statehouse banner" width={1100} height={800}>
          <Frame><WireStatehouse /></Frame>
        </DCArtboard>
      </DCSection>

      <DCSection id="modern" title="03 · Indiana visual language + modern" subtitle="State outline motifs, typographic, breathing room">
        <DCArtboard id="map" label="E. State outline watermark" width={1100} height={800}>
          <Frame><WireMap /></Frame>
        </DCArtboard>
        <DCArtboard id="minimal" label="F. Modern minimal / type-driven" width={1100} height={800}>
          <Frame><WireMinimal /></Frame>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
